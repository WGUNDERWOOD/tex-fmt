[workspace]
members = ["tex-fmt-lib", "."]

[package]
name = "tex-fmt"
edition = "2021"
version = "0.4.7"

[workspace.package]
authors = ["William George Underwood"]
license = "MIT"
repository = "https://github.com/WGUNDERWOOD/tex-fmt"
readme = "README.md"
edition = "2021"
description = "LaTeX formatter written in Rust"
keywords = ["latex", "formatter"]
categories = ["command-line-utilities", "development-tools"]
exclude = ["tests/*", "extra/*", "*.nix", ".github/*"]

[[bin]]
name = "bin"
path = "src/main.rs"

[dependencies]
tex-fmt-lib = { path = "./tex-fmt-lib" }

[profile.release]
codegen-units = 1
lto = true
